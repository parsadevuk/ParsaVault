name: parsa_vault
description: "Parsa Vault - Gamified stock and crypto trading simulator."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  firebase_crashlytics: ^4.3.0
  firebase_analytics: ^11.4.0

  # SSO providers
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.0

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  intl: ^0.20.2

  # Image picker for profile picture
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: "assets/images/logo_transparent.png"
