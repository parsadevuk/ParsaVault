name: parsa_vault
description: "Parsa Vault - Gamified stock and crypto trading simulator."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Local database
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.1

  # Utilities
  uuid: ^4.5.1
  crypto: ^3.0.6
  intl: ^0.20.2

  # Image picker for profile picture
  image_picker: ^1.1.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
